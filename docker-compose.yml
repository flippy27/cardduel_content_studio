services:
  cardduel-content-studio:
    build:
      context: .
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:5000}
    ports:
      - "5173:80"
    environment:
      - TZ=America/Santiago
      # Upstream for the nginx /api + /hubs proxy. Local default targets the
      # CardDuel server running on the host (Docker Desktop). The prod overlay
      # overrides this with the Pi's published port.
      - API_UPSTREAM=${API_UPSTREAM:-host.docker.internal:5000}
