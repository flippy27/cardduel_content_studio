# nginx config TEMPLATE — the nginx:alpine entrypoint runs envsubst on it and
# only substitutes variables that are actually defined in the environment
# (so ${API_UPSTREAM} is replaced, while nginx's own $uri/$host stay intact).
#
# Same-origin model: the browser only ever talks to this host. API + SignalR
# calls go to /api/* and /hubs/* and are proxied to the CardDuel server, so
# there is no cross-origin request and no CORS setup is needed anywhere.
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # CardDuel REST API (preserves the full /api/v1/... path).
  location /api/ {
    proxy_pass http://${API_UPSTREAM};
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_buffering off;
  }

  # SignalR hubs (WebSocket upgrade).
  location /hubs/ {
    proxy_pass http://${API_UPSTREAM};
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_buffering off;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /assets/ {
    expires 30d;
    add_header Cache-Control "public, immutable";
  }
}
